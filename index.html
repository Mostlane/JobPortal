<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostlane — Job Manager (Preview)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f5f7;--surface:#ffffff;--surface2:#f0f1f4;--surface3:#e8eaed;
  --border:#dfe1e6;--border-light:#c8ccd4;--text:#1a1d24;--text-dim:#5f6672;--text-faint:#9ca3af;
  --accent:#2b5ea0;--accent-hover:#3670b5;--accent-dim:rgba(43,94,160,0.08);
  --danger:#d94848;--danger-dim:rgba(217,72,72,0.08);
  --success:#3da66e;--success-dim:rgba(61,166,110,0.08);
  --info:#4a8fd4;--info-dim:rgba(74,143,212,0.08);
  --warning:#d4a03a;--warning-dim:rgba(212,160,58,0.1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:16px;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar .logo img{height:28px}
.topbar .divider{width:1px;height:20px;background:var(--border)}
.topbar-stats{display:flex;gap:14px;font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.topbar-stats strong{color:var(--text)}
.topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.main-content{flex:1;padding:20px 24px;max-width:1400px;margin:0 auto;width:100%}

.btn{padding:9px 16px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-sm{padding:6px 10px;font-size:11px}
.btn-outline{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--text-dim);color:var(--text)}

.tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:var(--radius);margin-bottom:20px;width:fit-content}
.tab{padding:8px 16px;border:none;background:transparent;color:var(--text-dim);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);transition:all .15s;position:relative}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.tab .badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;font-family:var(--mono)}

.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-input{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none;min-width:220px}
.filter-input:focus{border-color:var(--accent)}
.filter-select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none}

.job-list{display:flex;flex-direction:column;gap:8px}
.job-card{background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;cursor:pointer;transition:all .15s;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.job-card:hover{border-color:var(--border-light);background:var(--surface2)}
.job-card.flagged{border-left:3px solid var(--warning)}
.job-card-main{display:flex;flex-direction:column;gap:4px;min-width:0}
.job-card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.job-number{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
.job-type-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.job-type-badge.job{background:var(--info-dim);color:var(--info)}
.job-type-badge.quote{background:var(--warning-dim);color:var(--warning)}
.job-type-badge.order{background:var(--success-dim);color:var(--success)}
.job-summary{font-size:14px;font-weight:500;color:var(--text)}
.job-address{font-size:12px;color:var(--text-dim)}
.job-meta{display:flex;gap:14px;font-size:11px;color:var(--text-faint);margin-top:2px}
.job-flag{font-size:11px;color:var(--warning);margin-top:4px}
.job-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}

.status-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.status-badge.pending-review{background:var(--warning-dim);color:var(--warning)}
.status-badge.logged{background:var(--info-dim);color:var(--info)}
.status-badge.scheduled{background:rgba(139,92,246,.08);color:#8b5cf6}
.status-badge.in-progress{background:var(--accent-dim);color:var(--accent)}
.status-badge.complete{background:var(--success-dim);color:var(--success)}
.status-badge.invoiced{background:rgba(107,114,128,.08);color:#9ca3af}
.trade-badge{font-size:10px;color:var(--text-dim);font-family:var(--mono)}

.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.25);z-index:200;display:none}
.detail-overlay.active{display:block}
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:100vw;background:var(--surface);border-left:1px solid var(--border);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease}
.detail-panel.active{transform:translateX(0)}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.detail-header h2{font-size:16px;font-weight:700;color:var(--accent)}
.detail-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 8px}
.detail-close:hover{color:var(--text)}
.detail-body{padding:20px}
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);margin-bottom:10px}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row .label{color:var(--text-dim);min-width:120px}
.detail-row .value{color:var(--text);text-align:right;word-break:break-word;max-width:320px}
.detail-description{font-size:13px;line-height:1.6;color:var(--text);background:var(--bg);padding:12px;border-radius:var(--radius-sm);margin-top:8px}
.detail-controls{display:flex;flex-direction:column;gap:12px}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:11px;color:var(--text-dim);font-weight:500}
.control-group select,.control-group input,.control-group textarea{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:vertical}
.control-group textarea{min-height:80px}
.detail-actions{display:flex;gap:8px;margin-top:12px}
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0}
.history-content{flex:1}
.history-time{color:var(--text-faint);font-family:var(--mono);font-size:11px}
.history-desc{color:var(--text-dim);margin-top:2px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:.4}

.enroute-section{margin-top:4px}
.enroute-btn{width:100%;margin-bottom:12px}
.enroute-loading{font-size:12px;color:var(--text-dim);padding:12px;text-align:center}
.enroute-list{display:flex;flex-direction:column;gap:6px}
.enroute-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.enroute-card:hover{border-color:var(--border-light)}
.enroute-job{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)}
.enroute-addr{font-size:12px;color:var(--text-dim)}
.enroute-summary{font-size:12px;color:var(--text);margin-top:2px}
.enroute-detour{text-align:right}
.enroute-time{font-family:var(--mono);font-size:13px;font-weight:600}
.enroute-time.good{color:var(--success)}
.enroute-time.ok{color:var(--warning)}
.enroute-time.bad{color:var(--danger)}
.enroute-miles{font-size:11px;color:var(--text-faint)}
.enroute-none{font-size:12px;color:var(--text-faint);text-align:center;padding:12px}

/* ─── Booking ─── */
.booking-section{margin-top:4px}
.booking-current{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.booking-current .booking-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px}
.booking-current .booking-detail{font-size:13px;color:var(--text);line-height:1.7}
.booking-current .booking-detail span{color:var(--text-dim)}
.booking-form{display:flex;flex-direction:column;gap:10px}
.booking-row{display:flex;gap:8px}
.booking-row .control-group{flex:1}
.booking-time-row{display:flex;gap:8px;align-items:flex-end}
.booking-time-row .control-group{flex:1}
.booking-time-row .time-sep{font-size:14px;color:var(--text-dim);padding-bottom:10px;font-weight:600}

.email-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:10px;display:none}
.email-preview.visible{display:block}
.email-preview-header{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.email-preview-to{font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:var(--mono)}
.email-preview-body{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.email-preview-subject{font-size:12px;color:var(--text);font-weight:600;margin-bottom:6px}

.booking-actions{display:flex;gap:8px;margin-top:12px}
.btn-book{background:var(--accent);color:#fff}
.btn-book-send{background:var(--success);color:#fff}

/* ─── Workever ─── */
.workever-section{margin-top:4px}
.workever-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:10px}
.workever-status.sent{background:var(--success-dim);color:var(--success);border:1px solid rgba(61,166,110,0.2)}
.workever-status.not-sent{background:var(--bg);color:var(--text-faint);border:1px solid var(--border)}
.workever-status .wv-icon{font-size:16px}
.workever-status .wv-time{font-family:var(--mono);font-size:11px;margin-left:auto;color:var(--text-faint)}
.btn-workever{background:#4f46e5;color:#fff;width:100%}
.btn-workever:hover{background:#6366f1}
.btn-workever-all{background:#4f46e5;color:#fff}
.btn-workever-all:hover{background:#6366f1}

/* ─── Modal ─── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.modal p{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:16px}
.modal .modal-meta{font-family:var(--mono);font-size:11px;color:var(--text-faint);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions .btn{min-width:80px;justify-content:center}

/* ─── Bulk send progress ─── */
.bulk-progress{font-size:12px;color:var(--text-dim);padding:8px 0}
.bulk-progress .bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.bulk-progress .bar-fill{height:100%;background:#4f46e5;border-radius:2px;transition:width .3s}

@media(max-width:768px){.main-content{padding:12px}.detail-panel{width:100vw}.filters{flex-direction:column}.filter-input{min-width:100%}.topbar-stats{display:none}.job-card{grid-template-columns:1fr}.job-card-right{flex-direction:row;align-items:center}}
</style>
</head>

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(e => e.classList.toggle('active', e.dataset.tab === t));
  renderJobs();
}

function getFiltered() {
  let j = [...allJobs];
  if (currentTab === 'review') j = j.filter(x => x.status === 'Pending Review');
  else if (currentTab === 'active') j = j.filter(x => ['Logged','Scheduled','In Progress'].includes(x.status));
  else if (currentTab === 'complete') j = j.filter(x => ['Complete','Invoiced'].includes(x.status));
  const s = document.getElementById('searchInput').value.toLowerCase();
  if (s) j = j.filter(x => [x.jobNumber, x.propertyAddress, x.postcode, x.tenantName, x.summary, x.jobDescription].join(' ').toLowerCase().includes(s));
  const tr = document.getElementById('tradeFilter').value; if (tr) j = j.filter(x => x.trade === tr);
  const ty = document.getElementById('typeFilter').value; if (ty) j = j.filter(x => x.jobType === ty);
  return j;
}

const ORIGIN_PC = 'PO15 5RQ';

function distanceMatrix(origins, destinations) {
  return new Promise((resolve, reject) => {
    if (gmFailed) { reject(new Error('Google Maps blocked by this environment. Download the HTML file and open it directly in your browser to use this feature.')); return; }
    if (!gmLoaded || typeof google === 'undefined' || !google.maps) { reject(new Error('Google Maps loading — wait a few seconds and try again')); return; }
    new google.maps.DistanceMatrixService().getDistanceMatrix({
      origins, destinations,
      travelMode: google.maps.TravelMode.DRIVING,
      drivingOptions: { departureTime: new Date(), trafficModel: google.maps.TrafficModel.BEST_GUESS }
    }, (resp, status) => {
      if (status === 'OK') resolve(resp); else reject(new Error('Distance Matrix: ' + status));
    });
  });
}

async function findEnRoute() {
  if (!selectedJob) return;
  const resultsDiv = document.getElementById('enrouteResults');
  resultsDiv.innerHTML = '<div class="enroute-loading">Calculating live driving times…</div>';

  const thisJob = selectedJob;
  const otherOpen = allJobs.filter(j =>
    j.jobNumber !== thisJob.jobNumber && j.postcode &&
    !['Complete','Invoiced','Linked'].includes(j.status)
  );

  if (!otherOpen.length) {
    resultsDiv.innerHTML = '<div class="enroute-none">No other open jobs to compare</div>';
    return;
  }

  try {
    // Direct time: origin → this job
    const directResp = await distanceMatrix([ORIGIN_PC], [thisJob.postcode]);
    const directEl = directResp.rows[0].elements[0];
    if (directEl.status !== 'OK') { resultsDiv.innerHTML = '<div class="enroute-none">Could not calculate direct route</div>'; return; }
    const directSec = directEl.duration_in_traffic ? directEl.duration_in_traffic.value : directEl.duration.value;

    const pcs = [...new Set(otherOpen.map(j => j.postcode))];

    // Origin → each other postcode
    const fromOrigin = {};
    for (let i = 0; i < pcs.length; i += 25) {
      const batch = pcs.slice(i, i + 25);
      const resp = await distanceMatrix([ORIGIN_PC], batch);
      resp.rows[0].elements.forEach((el, idx) => {
        if (el.status === 'OK') fromOrigin[batch[idx]] = {
          sec: el.duration_in_traffic ? el.duration_in_traffic.value : el.duration.value,
          m: el.distance.value
        };
      });
    }

    // Each other postcode → this job
    const toTarget = {};
    for (let i = 0; i < pcs.length; i += 25) {
      const batch = pcs.slice(i, i + 25);
      const resp = await distanceMatrix(batch, [thisJob.postcode]);
      resp.rows.forEach((row, idx) => {
        const el = row.elements[0];
        if (el && el.status === 'OK') toTarget[batch[idx]] = {
          sec: el.duration_in_traffic ? el.duration_in_traffic.value : el.duration.value,
          m: el.distance.value
        };
      });
    }

    const results = [];
    for (const job of otherOpen) {
      const a = fromOrigin[job.postcode], b = toTarget[job.postcode];
      if (!a || !b) continue;
      const detourSec = (a.sec + b.sec) - directSec;
      const detourMins = Math.round(detourSec / 60);
      const detourMiles = ((a.m + b.m) / 1609.344 - parseFloat(thisJob.milesEachWay || 0)).toFixed(1);
      results.push({ job, detourMins, detourMiles });
    }
    results.sort((a, b) => a.detourMins - b.detourMins);

    if (!results.length) { resultsDiv.innerHTML = '<div class="enroute-none">Could not calculate routes</div>'; return; }

    resultsDiv.innerHTML = '<div class="enroute-list">' + results.map(r => {
      const tc = r.detourMins <= 10 ? 'good' : r.detourMins <= 25 ? 'ok' : 'bad';
      const px = r.detourMins <= 0 ? '' : '+';
      return '<div class="enroute-card"><div>' +
        '<div class="enroute-job">' + r.job.jobNumber + '</div>' +
        '<div class="enroute-addr">' + (r.job.shortAddress || r.job.propertyAddress) + ' · ' + r.job.postcode + '</div>' +
        '<div class="enroute-summary">' + (r.job.summary || r.job.trade) +
        ' · <span class="status-badge ' + r.job.status.toLowerCase().replace(/\s+/g,'-') + '" style="font-size:10px;padding:2px 6px">' + r.job.status + '</span></div>' +
        '</div><div class="enroute-detour">' +
        '<div class="enroute-time ' + tc + '">' + px + r.detourMins + ' min</div>' +
        '<div class="enroute-miles">' + px + r.detourMiles + ' mi detour</div>' +
        '</div></div>';
    }).join('') + '</div>';
  } catch (e) {
    resultsDiv.innerHTML = '<div class="enroute-none">Error: ' + e.message + '</div>';
  }
}

function generateTimeOptions(selected) {
  let opts = '';
  for (let h = 6; h <= 20; h++) {

      opts += '<option value="' + val + '"' + (val === selected ? ' selected' : '') + '>' + val + '</option>';
    }
  }
  return opts;
}

function saveBooking(sendEmail) {
  if (!selectedJob) return;
  const date = document.getElementById('bookDate').value;
  const start = document.getElementById('bookStart').value;
  const end = document.getElementById('bookEnd').value;
  const engineer = document.getElementById('bookEngineer').value;

  if (!date) { alert('Please select a date'); return; }
  if (!engineer) { alert('Please enter an engineer name'); return; }

  // Save booking to the job object (demo mode — in production this goes to KV via the Worker)
  selectedJob.booking = {
    date: date,
    startTime: start,
    endTime: end,
    engineer: engineer,
    emailSent: sendEmail,
    bookedAt: new Date().toISOString()
  };

  // Auto-update status and assigned
  selectedJob.status = 'Scheduled';
  selectedJob.scheduledDate = date;
  selectedJob.assignedTo = engineer;

  // Add to history
  selectedJob.history = selectedJob.history || [];
  selectedJob.history.push({
    timestamp: new Date().toISOString(),
    type: 'updated',
    by: 'portal',
    changes: {
      status: { from: selectedJob.status, to: 'Scheduled' },
      booking: { from: '', to: date + ' ' + start + '-' + end + ' (' + engineer + ')' }
    }
  });

  if (sendEmail) {
    const emails = (selectedJob.email || '').split(/[;,]/).map(e => e.trim()).filter(Boolean);
    if (!emails.length) {
      alert('No email addresses on file for this job — booking saved but no email sent.');
    } else {
      // In production: POST to Worker /jobs/:id/email endpoint
      alert('📧 Email would be sent to:\n' + emails.join('\n') + '\n\n(Email sending not yet configured — booking saved successfully)');
    }
  }

  // Re-render
  updateTopbar();
  renderJobs();
  renderDetail();

  showToast('Appointment ' + (sendEmail ? 'booked & email queued' : 'booked'), 'success');
}

// ============================================================
// WORKEVER INTEGRATION
// ============================================================
// In production: replace ZAPIER_WEBHOOK_URL with your actual Zapier webhook
const ZAPIER_WEBHOOK_URL = '';  // e.g. 'https://hooks.zapier.com/hooks/catch/xxxxx/yyyyy/'

function closeWvModal() {
  document.getElementById('workeverModal').classList.remove('active');
}

function sendToWorkever(jobNumber) {
  const job = allJobs.find(j => j.jobNumber === jobNumber);
  if (!job) return;

  if (job.workever) {
    // Already sent — show warning modal
    document.getElementById('wvModalTitle').textContent = '⚠️ Already Sent';
    document.getElementById('wvModalMsg').textContent = 'This job has already been sent to Workever. Do you want to send it again?';
    document.getElementById('wvModalMeta').textContent = 'Last sent: ' + new Date(job.workever.sentAt).toLocaleString('en-GB');
    document.getElementById('wvBulkProgress').innerHTML = '';
    document.getElementById('wvModalActions').innerHTML =
      '<button class="btn btn-outline" onclick="closeWvModal()">Cancel</button>' +
      '<button class="btn btn-workever" onclick="confirmSendToWorkever(\'' + jobNumber + '\')">Send Again</button>';
    document.getElementById('workeverModal').classList.add('active');
  } else {
    confirmSendToWorkever(jobNumber);
  }
}

function confirmSendToWorkever(jobNumber) {
  closeWvModal();
  const job = allJobs.find(j => j.jobNumber === jobNumber);
  if (!job) return;

  // Build the payload
  const payload = {
    jobNumber: job.jobNumber,
    tenant: job.tenant,
    tenantName: job.tenantName,
    propertyAddress: job.propertyAddress,
    shortAddress: job.shortAddress,
    postcode: job.postcode,
    mobile: job.mobile,
    email: job.email,
    trade: job.trade,
    jobType: job.jobType,
    summary: job.summary,
    jobDescription: job.jobDescription,
    dateJobEntered: job.dateJobEntered,
    status: job.status,
    agentName: job.agentName,
    agentCompany: job.agentCompany,
    milesEachWay: job.milesEachWay,
    milesRoundTrip: job.milesRoundTrip,
    travelTimeEachWay: job.travelTimeEachWay
  };

  if (ZAPIER_WEBHOOK_URL) {
    // Production: fire the webhook
    fetch(ZAPIER_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function() {
      markAsSentToWorkever(job);
    }).catch(function(e) {
      showToast('Failed to send: ' + e.message, 'error');
    });
  } else {
    // Demo mode
    markAsSentToWorkever(job);
  }
}

function markAsSentToWorkever(job) {
  job.workever = {
    sentAt: new Date().toISOString(),
    payload: true
  };
  job.history = job.history || [];
  job.history.push({
    timestamp: new Date().toISOString(),
    type: 'updated',
    by: 'portal',
    changes: { workever: { from: '', to: 'Sent to Workever' } }
  });

  showToast('Sent ' + job.jobNumber + ' to Workever', 'success');
  updateTopbar();
  renderJobs();
  if (selectedJob && selectedJob.jobNumber === job.jobNumber) renderDetail();
}

function sendAllToWorkever() {
  const unsent = allJobs.filter(j => !j.workever && !['Complete','Invoiced','Linked'].includes(j.status));

  if (unsent.length === 0) {
    document.getElementById('wvModalTitle').textContent = 'All Up to Date';
    document.getElementById('wvModalMsg').textContent = 'Every open job has already been sent to Workever.';
    document.getElementById('wvModalMeta').textContent = '';
    document.getElementById('wvBulkProgress').innerHTML = '';
    document.getElementById('wvModalActions').innerHTML =
      '<button class="btn btn-outline" onclick="closeWvModal()">OK</button>';
    document.getElementById('workeverModal').classList.add('active');
    return;
  }

  document.getElementById('wvModalTitle').textContent = '⚡ Send All to Workever';
  document.getElementById('wvModalMsg').textContent = unsent.length + ' job' + (unsent.length !== 1 ? 's' : '') + ' not yet sent to Workever. Send them all now?';
  document.getElementById('wvModalMeta').textContent = unsent.map(function(j) { return j.jobNumber + ' — ' + (j.summary || j.trade); }).join('\n');
  document.getElementById('wvModalMeta').style.whiteSpace = 'pre-wrap';
  document.getElementById('wvBulkProgress').innerHTML = '';
  document.getElementById('wvModalActions').innerHTML =
    '<button class="btn btn-outline" onclick="closeWvModal()">Cancel</button>' +
    '<button class="btn btn-workever" onclick="confirmSendAll()">Send ' + unsent.length + ' Jobs</button>';
  document.getElementById('workeverModal').classList.add('active');
}

async function confirmSendAll() {
  const unsent = allJobs.filter(j => !j.workever && !['Complete','Invoiced','Linked'].includes(j.status));
  const total = unsent.length;
  let sent = 0;

  document.getElementById('wvModalActions').innerHTML = '';
  const prog = document.getElementById('wvBulkProgress');

  for (const job of unsent) {
    sent++;
    prog.innerHTML = '<div class="bulk-progress">Sending ' + sent + ' of ' + total + '… <strong>' + job.jobNumber + '</strong><div class="bar"><div class="bar-fill" style="width:' + Math.round(sent / total * 100) + '%"></div></div></div>';

    if (ZAPIER_WEBHOOK_URL) {
      try {
        await fetch(ZAPIER_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jobNumber: job.jobNumber, propertyAddress: job.propertyAddress, trade: job.trade, summary: job.summary, jobDescription: job.jobDescription })
        });
      } catch(e) { /* continue */ }
    }

    markAsSentToWorkever(job);
    // Small delay so UI updates visibly
    await new Promise(function(r) { setTimeout(r, 300); });
  }

  prog.innerHTML = '<div class="bulk-progress" style="color:var(--success)">✓ All ' + total + ' jobs sent to Workever</div>';
  document.getElementById('wvModalActions').innerHTML =
    '<button class="btn btn-outline" onclick="closeWvModal()">Done</button>';
}

// ============================================================

function fmtH(h) {
  if (h.type === 'created') return 'Job created via ' + h.by;
  if (h.type === 'updated' && h.changes) return Object.entries(h.changes).map(([k, v]) => k + ': ' + (v.from || '(empty)') + ' → ' + v.to).join(', ');
  return h.type;
}

let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast visible ' + (type || 'success');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('visible'); }, 3000);
}
